<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Absensi Sekolah Minggu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background-color: white !important; }
            .card { border: none !important; shadow: none !important; }
        }
        .scan-line {
            height: 2px;
            background: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 15px 5px rgba(59, 130, 246, 0.5);
            position: absolute;
            width: 100%;
            animation: moveScan 2s linear infinite;
        }
        @keyframes moveScan {
            0% { top: 0; }
            100% { top: 100%; }
        }
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-900">

    <!-- Loading Overlay for Sync -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 font-medium text-slate-600">Menyinkronkan dengan Cloud...</p>
        </div>
    </div>

    <!-- LOGIN PAGE -->
    <div id="loginPage" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-200">
            <div class="text-center mb-8">
                <div class="bg-blue-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="users" class="text-white w-8 h-8"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-800">Portal Sekolah Minggu</h1>
                <p class="text-slate-500">Gunakan username: <span class="font-bold">admin</span></p>
            </div>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                    <input type="text" id="username" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="admin">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input type="password" id="password" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Immanuel2026">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition shadow-md">
                    Masuk Portal
                </button>
            </form>
        </div>
    </div>

    <!-- MAIN PORTAL -->
    <div id="mainPortal" class="hidden min-h-screen flex flex-col md:flex-row">
        <!-- Sidebar -->
        <nav class="w-full md:w-64 bg-white border-r border-slate-200 p-6 flex flex-col no-print">
            <div class="flex items-center gap-3 mb-10">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <i data-lucide="church" class="text-white w-6 h-6"></i>
                </div>
                <h2 class="font-bold text-xl text-slate-800">SM Portal</h2>
            </div>
            
            <div class="space-y-2 flex-grow">
                <button onclick="changeClass(window.currentClass)" class="nav-btn w-full flex items-center gap-3 px-4 py-2 rounded-lg bg-blue-50 text-blue-600">
                    <i data-lucide="clipboard-list" size="20"></i> Absensi
                </button>
                <button onclick="openRegisterModal()" class="w-full flex items-center gap-3 px-4 py-2 rounded-lg text-slate-600 hover:bg-slate-100">
                    <i data-lucide="user-plus" size="20"></i> Registrasi Baru
                </button>
                <button onclick="openScanModal()" class="w-full flex items-center gap-3 px-4 py-2 rounded-lg text-slate-600 hover:bg-slate-100">
                    <i data-lucide="camera" size="20"></i> Scan Wajah
                </button>
            </div>

            <button onclick="logout()" class="flex items-center gap-3 px-4 py-2 text-red-500 hover:bg-red-50 rounded-lg mt-10">
                <i data-lucide="log-out" size="20"></i> Keluar
            </button>
        </nav>

        <!-- Content -->
        <main class="flex-grow p-4 md:p-8">
            <!-- Header Tab Kelas -->
            <div class="flex flex-wrap gap-2 mb-8 no-print">
                <button onclick="changeClass('Bintang')" id="btn-Bintang" class="class-btn px-6 py-2 rounded-full font-medium bg-blue-600 text-white shadow-lg transition-all">Kelas Bintang</button>
                <button onclick="changeClass('Cahaya')" id="btn-Cahaya" class="class-btn px-6 py-2 rounded-full font-medium bg-white text-slate-600 border border-slate-200 transition-all">Kelas Cahaya</button>
                <button onclick="changeClass('Pra Remaja')" id="btn-Pra-Remaja" class="class-btn px-6 py-2 rounded-full font-medium bg-white text-slate-600 border border-slate-200 transition-all">Kelas Pra Remaja</button>
            </div>

            <!-- Table -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                    <div class="flex flex-col">
                        <h3 class="text-xl font-bold text-slate-800" id="tableTitle">Daftar Murid Kelas Bintang</h3>
                        <span id="cloudStatus" class="text-[10px] text-slate-400 flex items-center gap-1">
                            <i data-lucide="loader" class="animate-spin" size="12"></i> Menghubungkan...
                        </span>
                    </div>
                    <button onclick="window.print()" class="no-print flex items-center gap-2 bg-slate-800 text-white px-4 py-2 rounded-lg hover:bg-slate-900 transition">
                        <i data-lucide="printer" size="18"></i> Cetak Rekap
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-50 text-slate-600 uppercase text-xs font-semibold">
                            <tr>
                                <th class="px-6 py-4">Foto</th>
                                <th class="px-6 py-4">Nama</th>
                                <th class="px-6 py-4">Usia/Pendidikan</th>
                                <th class="px-6 py-4">Total Hadir</th>
                                <th class="px-6 py-4 no-print">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="studentTableBody" class="divide-y divide-slate-100 text-sm">
                            <!-- Data will be injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL REGISTRASI -->
    <div id="registerModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50 overflow-y-auto">
        <div class="bg-white rounded-2xl w-full max-w-lg p-6 my-8 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-slate-800">Registrasi Murid Baru</h2>
                <button onclick="closeRegisterModal()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x-circle"></i></button>
            </div>
            <form id="registerForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium mb-1">Nama Lengkap</label>
                        <input type="text" id="regNama" required class="w-full border p-2 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Kelas</label>
                        <select id="regKelas" class="w-full border p-2 rounded-lg">
                            <option value="Bintang">Bintang</option>
                            <option value="Cahaya">Cahaya</option>
                            <option value="Pra Remaja">Pra Remaja</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Tanggal Lahir</label>
                        <input type="date" id="regTgl" required class="w-full border p-2 rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Usia</label>
                        <input type="number" id="regUsia" required class="w-full border p-2 rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Pendidikan</label>
                        <select id="regPendidikan" class="w-full border p-2 rounded-lg">
                            <option>Belum Sekolah</option>
                            <option>SD Kelas 1</option>
                            <option>SD Kelas 2</option>
                            <option>SD Kelas 3</option>
                            <option>SD Kelas 4</option>
                            <option>SD Kelas 5</option>
                            <option>SD Kelas 6</option>
                            <option>SMP Kelas 1</option>
                            <option>SMP Kelas 2</option>
                            <option>SMP Kelas 3</option>
                        </select>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium mb-1">Foto Profil (URL Gambar)</label>
                        <input type="text" id="regFoto" placeholder="Contoh: https://i.pravatar.cc/150" class="w-full border p-2 rounded-lg">
                        <p class="text-[10px] text-slate-400 mt-1">*Masukkan link foto dari internet untuk identitas</p>
                    </div>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg mt-4 hover:bg-blue-700 transition">
                    Simpan Data Murid
                </button>
            </form>
        </div>
    </div>

    <!-- MODAL SCAN -->
    <div id="scanModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50">
        <div class="bg-slate-800 rounded-3xl w-full max-w-xl p-8 relative border border-slate-700">
            <button onclick="closeScanModal()" class="absolute top-4 right-4 text-white/50 hover:text-white"><i data-lucide="x-circle"></i></button>
            <h2 class="text-xl font-bold text-white mb-6 text-center">Scan Wajah Murid</h2>
            
            <div id="cameraArea" class="relative aspect-video bg-black rounded-2xl overflow-hidden mb-6 border-2 border-blue-500/30">
                <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
                <div class="scan-line"></div>
                <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                    <div class="w-48 h-48 border-2 border-dashed border-white/50 rounded-full"></div>
                </div>
            </div>

            <div id="scanResult" class="hidden mb-6 p-6 rounded-xl text-center">
                <!-- Result dynamically injected -->
            </div>

            <button id="captureBtn" onclick="simulateScan()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-xl hover:bg-blue-700 transition flex items-center justify-center gap-2">
                <i data-lucide="camera" size="24"></i> Deteksi Wajah
            </button>
        </div>
    </div>

    <!-- Firebase SDK & App Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Configuration
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sm-absensi-portal';

        // State Global
        window.students = [];
        window.currentClass = 'Bintang';
        let currentUser = null;

        // --- AUTHENTICATION ---
        const initCloudSync = async () => {
            document.getElementById('loadingOverlay').classList.remove('hidden');
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth Error:", error);
                document.getElementById('loadingOverlay').classList.add('hidden');
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                // Ambil data dari Cloud Firestore
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'students'));
                onSnapshot(q, (snapshot) => {
                    window.students = snapshot.docs.map(doc => ({ ...doc.data(), docId: doc.id }));
                    renderStudents();
                    document.getElementById('loadingOverlay').classList.add('hidden');
                    document.getElementById('cloudStatus').innerHTML = `<i data-lucide="cloud-check" size="12" class="text-green-500"></i> <span class="text-green-500">Terhubung & Sinkron</span>`;
                    lucide.createIcons();
                }, (error) => {
                    console.error("Firestore Sync Error:", error);
                    document.getElementById('cloudStatus').innerHTML = `<i data-lucide="cloud-off" size="12" class="text-red-400"></i> <span class="text-red-400">Gagal Sinkron</span>`;
                    lucide.createIcons();
                });
            }
        });

        // --- UI FUNCTIONS (EXPORTED TO WINDOW) ---
        window.renderStudents = () => {
            const body = document.getElementById('studentTableBody');
            const filtered = window.students.filter(s => s.kelas === window.currentClass);
            
            body.innerHTML = filtered.length ? '' : '<tr><td colspan="5" class="p-10 text-center text-slate-400">Belum ada data murid di kelas ini.</td></tr>';
            
            filtered.forEach(s => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition";
                const displayFoto = s.fotoProfil || 'https://via.placeholder.com/150?text=No+Foto';
                
                tr.innerHTML = `
                    <td class="px-6 py-4">
                        <img src="${displayFoto}" class="w-12 h-12 rounded-full object-cover bg-slate-200 border border-slate-300" onerror="this.src='https://via.placeholder.com/150?text=Error'">
                    </td>
                    <td class="px-6 py-4 font-medium text-slate-800">${s.nama}</td>
                    <td class="px-6 py-4 text-slate-600">${s.usia} thn / ${s.pendidikan}</td>
                    <td class="px-6 py-4">
                        <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold">
                            ${s.absensi ? s.absensi.length : 0} Hari
                        </span>
                    </td>
                    <td class="px-6 py-4 no-print">
                        <button onclick="absenManual('${s.id}')" class="text-blue-600 hover:text-blue-800 font-bold">Absen</button>
                    </td>
                `;
                body.appendChild(tr);
            });
        };

        window.changeClass = (cls) => {
            window.currentClass = cls;
            document.querySelectorAll('.class-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white', 'shadow-lg');
                btn.classList.add('bg-white', 'text-slate-600', 'border', 'border-slate-200');
            });
            const activeBtn = document.getElementById(`btn-${cls.replace(/\s+/g, '-')}`);
            if (activeBtn) activeBtn.classList.add('bg-blue-600', 'text-white', 'shadow-lg');
            document.getElementById('tableTitle').innerText = `Daftar Murid Kelas ${cls}`;
            renderStudents();
        };

        window.absenManual = async (id) => {
            const today = new Date().toLocaleDateString();
            const s = window.students.find(x => x.id.toString() === id.toString());
            if (s) {
                if (!s.absensi) s.absensi = [];
                if (!s.absensi.includes(today)) {
                    const newAbsensi = [...s.absensi, today];
                    try {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', id.toString()), {
                            absensi: newAbsensi
                        });
                    } catch (error) { console.error("Update Error:", error); }
                }
            }
        };

        window.logout = () => { location.reload(); };

        // Handle Login Submission
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();

            if (user === 'admin' && pass === 'Immanuel2026') {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('mainPortal').classList.remove('hidden');
                renderStudents();
                lucide.createIcons();
            } else {
                alert('Username atau Password salah!');
            }
        };

        // Handle Register Submission
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            if (!currentUser) return;

            const studentId = Date.now().toString();
            const newStudent = {
                id: studentId,
                nama: document.getElementById('regNama').value,
                kelas: document.getElementById('regKelas').value,
                tanggalLahir: document.getElementById('regTgl').value,
                usia: document.getElementById('regUsia').value,
                pendidikan: document.getElementById('regPendidikan').value,
                fotoProfil: document.getElementById('regFoto').value,
                absensi: []
            };

            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', studentId), newStudent);
                closeRegisterModal();
                e.target.reset();
            } catch (error) { alert("Gagal menyimpan ke cloud: " + error.message); }
        };

        // Camera Logic
        let videoStream;
        window.openScanModal = () => {
            document.getElementById('scanModal').classList.remove('hidden');
            const video = document.getElementById('video');
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                .then(stream => {
                    videoStream = stream;
                    video.srcObject = stream;
                    video.onloadedmetadata = () => video.play();
                })
                .catch(() => alert("Kamera tidak dapat diakses."));
        };

        window.closeScanModal = () => {
            document.getElementById('scanModal').classList.add('hidden');
            if (videoStream) videoStream.getTracks().forEach(t => t.stop());
            document.getElementById('scanResult').classList.add('hidden');
            document.getElementById('cameraArea').classList.remove('hidden');
            document.getElementById('captureBtn').classList.remove('hidden');
        };

        window.simulateScan = () => {
            const resultDiv = document.getElementById('scanResult');
            const cameraArea = document.getElementById('cameraArea');
            const captureBtn = document.getElementById('captureBtn');

            cameraArea.classList.add('hidden');
            captureBtn.classList.add('hidden');
            resultDiv.classList.remove('hidden');
            resultDiv.innerHTML = '<div class="text-white animate-pulse flex flex-col items-center gap-4"><div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div><p>Mencocokkan wajah...</p></div>';

            setTimeout(() => {
                if (window.students.length > 0) {
                    const randomStudent = window.students[Math.floor(Math.random() * window.students.length)];
                    resultDiv.className = "mb-6 p-6 rounded-xl text-center bg-green-500/20 text-green-400 border border-green-500/50";
                    resultDiv.innerHTML = `
                        <i data-lucide="check-circle" class="mx-auto mb-2 w-12 h-12"></i>
                        <h3 class="text-xl font-bold">BERHASIL!</h3>
                        <div class="mt-4 flex flex-col items-center">
                            <img src="${randomStudent.fotoProfil || 'https://via.placeholder.com/150'}" class="w-20 h-20 rounded-full border-2 border-green-500 object-cover mb-2">
                            <p class="text-white font-bold">${randomStudent.nama}</p>
                            <p class="text-sm opacity-70">Kelas ${randomStudent.kelas}</p>
                        </div>
                    `;
                    absenManual(randomStudent.id);
                } else {
                    resultDiv.innerHTML = `<p class="text-white">Belum ada data murid.</p>`;
                }
                lucide.createIcons();
            }, 2000);
        };

        window.openRegisterModal = () => document.getElementById('registerModal').classList.remove('hidden');
        window.closeRegisterModal = () => document.getElementById('registerModal').classList.add('hidden');

        // Start Auth
        initCloudSync();
        lucide.createIcons();
    </script>
</body>
</html>
