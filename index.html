<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Absensi Sekolah Minggu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background-color: white !important; }
        }
        .scan-line {
            height: 2px;
            background: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 15px 5px rgba(59, 130, 246, 0.5);
            position: absolute;
            width: 100%;
            animation: moveScan 2s linear infinite;
        }
        @keyframes moveScan {
            0% { top: 0; }
            100% { top: 100%; }
        }
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-900">

    <!-- Loading Sync Overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 font-medium text-slate-600">Menghubungkan ke Cloud...</p>
        </div>
    </div>

    <!-- HALAMAN LOGIN -->
    <div id="loginPage" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-200">
            <div class="text-center mb-8">
                <div class="bg-blue-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="users" class="text-white w-8 h-8"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-800">Portal Sekolah Minggu</h1>
                <p class="text-slate-500 text-sm">Masukkan kredensial admin Anda</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                    <input type="text" id="username" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="admin">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input type="password" id="password" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="••••••••">
                </div>
                <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition shadow-md">
                    Masuk Portal
                </button>
                <p class="text-[10px] text-center text-slate-400 mt-4 italic">User: admin | Pass: Immanuel2026</p>
            </div>
        </div>
    </div>

    <!-- PORTAL UTAMA -->
    <div id="mainPortal" class="hidden min-h-screen flex flex-col md:flex-row">
        <!-- Sidebar -->
        <nav class="w-full md:w-64 bg-white border-r border-slate-200 p-6 flex flex-col no-print">
            <div class="flex items-center gap-3 mb-10">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <i data-lucide="church" class="text-white w-6 h-6"></i>
                </div>
                <h2 class="font-bold text-xl text-slate-800">SM Portal</h2>
            </div>
            
            <div class="space-y-2 flex-grow">
                <button onclick="changeClass(window.currentClass)" class="w-full flex items-center gap-3 px-4 py-2 rounded-lg bg-blue-50 text-blue-600">
                    <i data-lucide="clipboard-list" size="20"></i> Absensi
                </button>
                <button onclick="openRegisterModal()" class="w-full flex items-center gap-3 px-4 py-2 rounded-lg text-slate-600 hover:bg-slate-100">
                    <i data-lucide="user-plus" size="20"></i> Registrasi Baru
                </button>
                <button onclick="openScanModal()" class="w-full flex items-center gap-3 px-4 py-2 rounded-lg text-slate-600 hover:bg-slate-100">
                    <i data-lucide="camera" size="20"></i> Scan Wajah
                </button>
            </div>

            <button onclick="location.reload()" class="flex items-center gap-3 px-4 py-2 text-red-500 hover:bg-red-50 rounded-lg mt-10">
                <i data-lucide="log-out" size="20"></i> Keluar
            </button>
        </nav>

        <!-- Main Content -->
        <main class="flex-grow p-4 md:p-8">
            <div class="flex flex-wrap gap-2 mb-8 no-print">
                <button onclick="changeClass('Bintang')" id="btn-Bintang" class="class-btn px-6 py-2 rounded-full font-medium bg-blue-600 text-white shadow-lg">Kelas Bintang</button>
                <button onclick="changeClass('Cahaya')" id="btn-Cahaya" class="class-btn px-6 py-2 rounded-full font-medium bg-white text-slate-600 border border-slate-200">Kelas Cahaya</button>
                <button onclick="changeClass('Pra Remaja')" id="btn-Pra-Remaja" class="class-btn px-6 py-2 rounded-full font-medium bg-white text-slate-600 border border-slate-200">Kelas Pra Remaja</button>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                    <div>
                        <h3 class="text-xl font-bold text-slate-800" id="tableTitle">Daftar Murid Kelas Bintang</h3>
                        <div id="cloudStatus" class="flex items-center gap-1 mt-1">
                             <!-- Status Cloud -->
                        </div>
                    </div>
                    <button onclick="window.print()" class="no-print flex items-center gap-2 bg-slate-800 text-white px-4 py-2 rounded-lg hover:bg-slate-900 transition text-sm">
                        <i data-lucide="printer" size="16"></i> Cetak Rekap
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-50 text-slate-600 uppercase text-xs font-semibold">
                            <tr>
                                <th class="px-6 py-4">Foto</th>
                                <th class="px-6 py-4">Nama</th>
                                <th class="px-6 py-4">Usia</th>
                                <th class="px-6 py-4">Hadir</th>
                                <th class="px-6 py-4 no-print">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="studentTableBody" class="divide-y divide-slate-100 text-sm text-slate-700">
                            <!-- Data injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL REGISTRASI -->
    <div id="registerModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50 overflow-y-auto">
        <div class="bg-white rounded-2xl w-full max-w-lg p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-slate-800">Murid Baru</h2>
                <button onclick="closeRegisterModal()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button>
            </div>
            <form id="registerForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Nama Lengkap</label>
                        <input type="text" id="regNama" required class="w-full border p-2 rounded-lg">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Kelas</label>
                        <select id="regKelas" class="w-full border p-2 rounded-lg">
                            <option value="Bintang">Bintang</option>
                            <option value="Cahaya">Cahaya</option>
                            <option value="Pra Remaja">Pra Remaja</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Usia</label>
                        <input type="number" id="regUsia" required class="w-full border p-2 rounded-lg">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold uppercase text-slate-500 mb-1">URL Foto Profil</label>
                        <input type="text" id="regFoto" placeholder="https://..." class="w-full border p-2 rounded-lg">
                    </div>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg mt-4 shadow-lg hover:bg-blue-700">Simpan Ke Cloud</button>
            </form>
        </div>
    </div>

    <!-- MODAL SCAN -->
    <div id="scanModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50">
        <div class="bg-slate-800 rounded-3xl w-full max-w-xl p-8 relative border border-slate-700 text-center">
            <button onclick="closeScanModal()" class="absolute top-4 right-4 text-white/50"><i data-lucide="x"></i></button>
            <h2 class="text-xl font-bold text-white mb-6">Scan Wajah Murid</h2>
            <div id="cameraArea" class="relative aspect-video bg-black rounded-2xl overflow-hidden mb-6 border-2 border-blue-500/30">
                <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
                <div class="scan-line"></div>
            </div>
            <div id="scanResult" class="hidden mb-6 p-6 rounded-xl"></div>
            <button id="captureBtn" onclick="simulateScan()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2">
                <i data-lucide="camera" size="24"></i> Deteksi Wajah
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Konfigurasi
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-sm-app';

        // State
        window.students = [];
        window.currentClass = 'Bintang';
        let userAuthenticated = false;

        // --- AUTH & DATA SYNC ---
        const startSync = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) { console.error("Sync Error", e); }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userAuthenticated = true;
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'students');
                onSnapshot(q, (snapshot) => {
                    window.students = snapshot.docs.map(d => d.data());
                    renderStudents();
                    updateCloudStatus(true);
                }, (err) => updateCloudStatus(false));
            }
        });

        // --- GLOBAL UI FUNCTIONS ---
        window.handleLogin = () => {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            if (u === 'admin' && p === 'Immanuel2026') {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('mainPortal').style.display = 'flex';
                document.getElementById('mainPortal').classList.remove('hidden');
                lucide.createIcons();
                renderStudents();
            } else {
                alert("Username atau Password Salah!");
            }
        };

        window.renderStudents = () => {
            const body = document.getElementById('studentTableBody');
            const filtered = window.students.filter(s => s.kelas === window.currentClass);
            
            body.innerHTML = filtered.length ? '' : '<tr><td colspan="5" class="p-10 text-center text-slate-400">Data tidak ditemukan.</td></tr>';
            
            filtered.forEach(s => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition";
                tr.innerHTML = `
                    <td class="px-6 py-4">
                        <img src="${s.fotoProfil || 'https://via.placeholder.com/150'}" class="w-10 h-10 rounded-full object-cover border border-slate-200" onerror="this.src='https://via.placeholder.com/150'">
                    </td>
                    <td class="px-6 py-4 font-bold text-slate-800">${s.nama}</td>
                    <td class="px-6 py-4">${s.usia} Tahun</td>
                    <td class="px-6 py-4">
                        <span class="bg-blue-100 text-blue-700 px-2 py-1 rounded text-xs font-bold">${s.absensi ? s.absensi.length : 0} Kali</span>
                    </td>
                    <td class="px-6 py-4 no-print">
                        <button onclick="absenManual('${s.id}')" class="text-blue-600 font-bold hover:underline">Hadir</button>
                    </td>
                `;
                body.appendChild(tr);
            });
        };

        window.changeClass = (cls) => {
            window.currentClass = cls;
            document.querySelectorAll('.class-btn').forEach(btn => {
                btn.className = "class-btn px-6 py-2 rounded-full font-medium bg-white text-slate-600 border border-slate-200";
            });
            const activeId = `btn-${cls.replace(/\s+/g, '-')}`;
            document.getElementById(activeId).className = "class-btn px-6 py-2 rounded-full font-medium bg-blue-600 text-white shadow-lg";
            document.getElementById('tableTitle').innerText = `Daftar Murid Kelas ${cls}`;
            renderStudents();
        };

        window.absenManual = async (id) => {
            if (!userAuthenticated) return;
            const today = new Date().toLocaleDateString();
            const s = window.students.find(x => x.id === id);
            if (s) {
                const currentAbsen = s.absensi || [];
                if (!currentAbsen.includes(today)) {
                    try {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', id), {
                            absensi: [...currentAbsen, today]
                        });
                    } catch (e) { console.error(e); }
                } else {
                    alert("Sudah absen hari ini!");
                }
            }
        };

        const updateCloudStatus = (status) => {
            const el = document.getElementById('cloudStatus');
            if (status) {
                el.innerHTML = `<span class="text-[10px] text-green-500 flex items-center gap-1"><i data-lucide="cloud-check" size="12"></i> Sinkron Cloud Aktif</span>`;
            } else {
                el.innerHTML = `<span class="text-[10px] text-red-400 flex items-center gap-1"><i data-lucide="cloud-off" size="12"></i> Mode Offline</span>`;
            }
            lucide.createIcons();
        };

        // Form Registration
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = Date.now().toString();
            const data = {
                id: id,
                nama: document.getElementById('regNama').value,
                kelas: document.getElementById('regKelas').value,
                usia: document.getElementById('regUsia').value,
                fotoProfil: document.getElementById('regFoto').value,
                absensi: []
            };
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', id), data);
                closeRegisterModal();
                e.target.reset();
            } catch (err) { alert("Gagal Simpan"); }
        };

        // Modal Helpers
        window.openRegisterModal = () => document.getElementById('registerModal').classList.remove('hidden');
        window.closeRegisterModal = () => document.getElementById('registerModal').classList.add('hidden');
        
        // Camera Helpers
        let streamObj;
        window.openScanModal = () => {
            document.getElementById('scanModal').classList.remove('hidden');
            navigator.mediaDevices.getUserMedia({ video: true }).then(s => {
                streamObj = s;
                document.getElementById('video').srcObject = s;
            });
        };
        window.closeScanModal = () => {
            document.getElementById('scanModal').classList.add('hidden');
            if(streamObj) streamObj.getTracks().forEach(t => t.stop());
            document.getElementById('scanResult').classList.add('hidden');
            document.getElementById('cameraArea').classList.remove('hidden');
            document.getElementById('captureBtn').classList.remove('hidden');
        };
        window.simulateScan = () => {
            const res = document.getElementById('scanResult');
            document.getElementById('cameraArea').classList.add('hidden');
            document.getElementById('captureBtn').classList.add('hidden');
            res.classList.remove('hidden');
            res.innerHTML = '<p class="text-blue-400 animate-pulse">Mencocokkan Wajah...</p>';
            setTimeout(() => {
                if (window.students.length) {
                    const r = window.students[Math.floor(Math.random() * window.students.length)];
                    res.innerHTML = `<div class="text-green-400"><i data-lucide="check" class="mx-auto w-12 h-12"></i><p class="font-bold text-white">${r.nama}</p><p class="text-xs">Berhasil Absen Otomatis</p></div>`;
                    absenManual(r.id);
                } else {
                    res.innerHTML = '<p class="text-red-400">Data Kosong</p>';
                }
                lucide.createIcons();
            }, 2000);
        };

        // Init
        startSync();
        lucide.createIcons();
    </script>
</body>
</html>
